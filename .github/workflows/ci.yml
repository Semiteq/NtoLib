name: ci

on:
  push:
    branches: [master, main]
    paths:
      - ".github/workflows/ci.yml"
      - "NtoLib/**"
      - "Tests/**"
      - "Resources/**"
      - "NtoLib.sln"
      - "Directory.Packages.props"
      - "nuget.config"
      - "global.json"
      - ".editorconfig"
      - "!**.md"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "NtoLib/**"
      - "Tests/**"
      - "Resources/**"
      - "NtoLib.sln"
      - "Directory.Packages.props"
      - "nuget.config"
      - "global.json"
      - ".editorconfig"
      - "!**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: restore
        run: dotnet restore NtoLib.sln

      - name: build
        run: dotnet build NtoLib.sln -c Release --no-restore

      - name: test
        run: dotnet test NtoLib.sln -c Release --no-build --logger "console;verbosity=normal"

      - name: verify formatting
        run: dotnet format NtoLib.sln --verify-no-changes
